<div class="task-item">
  <input
    type="checkbox"
    [checked]="task.completed"
    (change)="onToggle()"
  />

  <span [class.completed]="task.completed">
    {{ task.title }}
  </span>

  <div class="actions">
    <button (click)="onEdit()">✏️</button>
    <button (click)="onRemove()">🗑️</button>
  </div>
</div>
