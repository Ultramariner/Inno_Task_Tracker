<div class="task-item">

  <select [value]="task.status" (change)="onStatusChange($event)">
    <option *ngFor="let s of statuses" [value]="s">
      {{ s }}
    </option>
  </select>

  <span [class.completed]="task.status === 'DONE'">
    {{ task.title }}
  </span>

  <div class="actions">
    <button (click)="onEdit()">✏️</button>
    <button (click)="onRemove()">🗑️</button>
  </div>

</div>
