<div class="editor">
  <label>
    Название:
    <input [(ngModel)]="title" />
  </label>

  <label>
    Описание:
    <textarea [(ngModel)]="description"></textarea>
  </label>

  <div class="buttons">
    <button (click)="onSave()">Сохранить</button>
    <button (click)="cancel.emit()">Отмена</button>
  </div>
</div>
