<h3>{{ task ? 'Редактировать задачу' : 'Новая задача' }}</h3>

<label>
  Название:
  <input [(ngModel)]="title" />
</label>

<label>
  Описание:
  <textarea [(ngModel)]="description"></textarea>
</label>

<div class="buttons">
  <button class="primary" (click)="onSave()">Сохранить</button>
  <button class="secondary" (click)="cancel.emit()">Отмена</button>
</div>
